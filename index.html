<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kunal | Personal Website</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: #fffaf2;
      --text: #1f1a17;
      --muted: #6d6259;
      --accent: #b85c38;
      --border: #dccfbe;
      --shadow: rgba(57, 39, 20, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(184, 92, 56, 0.12), transparent 28%),
        linear-gradient(180deg, #f9f3eb 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      width: min(860px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0 5rem;
    }

    .hero {
      margin-bottom: 3rem;
    }

    .eyebrow {
      margin: 0 0 0.75rem;
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .intro {
      max-width: 42rem;
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .section-title {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .post-list {
      display: grid;
      gap: 1rem;
    }

    .post-card {
      display: block;
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      box-shadow: 0 14px 30px var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .post-card:hover,
    .post-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 18px 40px rgba(57, 39, 20, 0.14);
    }

    .post-date {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .post-title {
      margin: 0;
      font-size: 1.65rem;
    }

    .post-summary {
      margin: 0.7rem 0 0;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <p class="eyebrow">Personal Website</p>
      <h1>Kunal</h1>
      <p class="intro">
        A simple static homepage with a blog list. More posts can be added here over time.
      </p>
    </header>

    <section aria-labelledby="blog-posts-title">
      <h2 class="section-title" id="blog-posts-title">Blog Posts</h2>
      <div class="post-list">
        <a class="post-card" href="blog/test.html">
          <span class="post-date">Posted April 11, 2026</span>
          <h3 class="post-title">test</h3>
          <p class="post-summary">A placeholder blog post.</p>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
