<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A first-principles guide to reinforcement learning and preference optimization for modern LLM post-training.">
  <title>An intro to RL in modern LLMs | Kunal</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: #fffaf2;
      --text: #1f1a17;
      --muted: #6d6259;
      --accent: #b85c38;
      --border: #dccfbe;
      --code-bg: #f1e7da;
      --shadow: rgba(57, 39, 20, 0.08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(184, 92, 56, 0.12), transparent 28%),
        linear-gradient(180deg, #f9f3eb 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      width: min(900px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 5rem;
    }

    a { color: var(--accent); }

    .back {
      display: inline-block;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }

    article {
      padding: clamp(1.25rem, 4vw, 3.5rem);
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 18px 45px var(--shadow);
    }

    article > h1:first-child {
      margin-top: 0;
      font-size: clamp(1.9rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.035em;
    }

    h1, h2, h3, h4, h5 {
      line-height: 1.18;
      text-wrap: balance;
    }

    h2 {
      margin: 3.5rem 0 1.25rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: clamp(1.8rem, 4vw, 2.45rem);
    }

    h3 {
      margin: 2.5rem 0 1rem;
      font-size: clamp(1.3rem, 3vw, 1.6rem);
    }

    h4 {
      margin: 2rem 0 0.75rem;
      color: var(--accent);
      font-size: 1.08rem;
    }

    h5 {
      margin: 1.6rem 0 0.65rem;
      font-size: 1rem;
    }

    p, li {
      font-size: 1.06rem;
      line-height: 1.75;
    }

    p { margin: 1rem 0; }

    .date {
      margin: -0.25rem 0 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    li + li { margin-top: 0.55rem; }

    blockquote {
      margin: 1.5rem 0;
      padding: 0.25rem 1.25rem;
      border-left: 4px solid var(--accent);
      color: var(--muted);
      background: rgba(184, 92, 56, 0.05);
    }

    table {
      width: 100%;
      margin: 1.5rem 0;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      padding: 0.7rem;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th { background: var(--code-bg); }

    code {
      padding: 0.1em 0.3em;
      border-radius: 5px;
      background: var(--code-bg);
      font-size: 0.9em;
    }

    pre {
      max-width: 100%;
      overflow-x: auto;
      padding: 1rem;
      border-radius: 12px;
      background: var(--code-bg);
    }

    pre code { padding: 0; }

    .table-wrap, mjx-container[display="true"] {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .mermaid {
      margin: 2rem 0;
      overflow-x: auto;
      text-align: center;
    }

    .status {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 640px) {
      .wrap { width: min(100% - 1rem, 900px); }
      article { border-radius: 16px; }
      table { min-width: 640px; }
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <main class="wrap">
    <a class="back" href="../index.html">Back to home</a>
    <article>
      <h1>An intro to RL in modern LLMs</h1>
      <p class="date">Posted July 12, 2026</p>
      <div id="post" aria-live="polite">
        <p class="status">Loading post…</p>
      </div>
    </article>
    <noscript>This post requires JavaScript to render its Markdown and equations.</noscript>
  </main>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const post = document.querySelector('#post');

    const escapeHtml = (value) => value
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;');

    marked.use({
      extensions: [
        {
          name: 'displayMath',
          level: 'block',
          start(src) { return src.indexOf('$$'); },
          tokenizer(src) {
            const match = /^\$\$\n([\s\S]+?)\n\$\$(?:\n|$)/.exec(src);
            if (match) return { type: 'displayMath', raw: match[0], text: match[1] };
          },
          renderer(token) { return `\\[${escapeHtml(token.text)}\\]\n`;
          }
        },
        {
          name: 'inlineMath',
          level: 'inline',
          start(src) { return src.indexOf('$'); },
          tokenizer(src) {
            const match = /^\$([^$\n]+?)\$/.exec(src);
            if (match) return { type: 'inlineMath', raw: match[0], text: match[1] };
          },
          renderer(token) { return `\\(${escapeHtml(token.text)}\\)`; }
        }
      ]
    });

    try {
      const response = await fetch('./intro_rl.md');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const markdown = await response.text();
      post.innerHTML = marked.parse(markdown, { gfm: true });

      post.querySelectorAll('table').forEach((table) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'table-wrap';
        table.before(wrapper);
        wrapper.append(table);
      });

      post.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
        const diagram = document.createElement('div');
        diagram.className = 'mermaid';
        diagram.textContent = code.textContent;
        code.parentElement.replaceWith(diagram);
      });

      mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'strict' });
      await mermaid.run({ nodes: post.querySelectorAll('.mermaid') });

      if (window.MathJax?.startup?.promise) await window.MathJax.startup.promise;
      if (window.MathJax?.typesetPromise) await window.MathJax.typesetPromise([post]);
    } catch (error) {
      post.innerHTML = `<h1>Unable to load the post</h1><p>${escapeHtml(error.message)}</p>`;
    }
  </script>
</body>
</html>
