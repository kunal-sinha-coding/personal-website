<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: #fffaf2;
      --text: #1f1a17;
      --muted: #6d6259;
      --accent: #b85c38;
      --border: #dccfbe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(184, 92, 56, 0.12), transparent 28%),
        linear-gradient(180deg, #f9f3eb 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0 5rem;
    }

    a {
      color: var(--accent);
    }

    article {
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.25rem, 6vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .date {
      margin: 0 0 2rem;
      color: var(--muted);
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .back {
      display: inline-block;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="back" href="../index.html">Back to home</a>
    <article>
      <h1>test</h1>
      <p class="date">Posted April 11, 2026</p>
      <p>test</p>
    </article>
  </main>
</body>
</html>
